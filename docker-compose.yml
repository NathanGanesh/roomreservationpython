services:
  python-db:
    image: postgres:16-alpine
    container_name: dealradar-python-db
    environment:
      POSTGRES_DB: dealradar
      POSTGRES_USER: dealradar
      POSTGRES_PASSWORD: dealradar
    ports:
      - "5432:5432"
    volumes:
      - python-db-data:/var/lib/postgresql/data

  python-ingestion:
    build:
      context: .
      dockerfile: Dockerfile.python
    environment:
      APP_ENV: development
      SECRET_KEY: dealradar-dev-secret
      JWT_SECRET_KEY: dealradar-jwt-secret
      DATABASE_URL: postgresql+psycopg://dealradar:dealradar@python-db:5432/dealradar
    depends_on:
      - python-db
    ports:
      - "5000:5000"

volumes:
  python-db-data:
