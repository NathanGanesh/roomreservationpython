stages:
  - lint
  - test

python_lint:
  stage: lint
  image: python:3.12
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r reqs.txt
  script:
    - ruff check .

python_test:
  stage: test
  image: python:3.12
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r reqs.txt
  script:
    - pytest
