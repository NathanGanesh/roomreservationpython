services:
  postgres:
    image: postgres:16-alpine
    container_name: dealradar-postgres
    environment:
      POSTGRES_DB: dealradar
      POSTGRES_USER: dealradar
      POSTGRES_PASSWORD: dealradar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
